spring.application.name=project
weather.fetch.enabled=true
kma.url=https://apihub.kma.go.kr/api/typ01/url/kma_sfctm2.php
kma.authKey=${KMA_AUTH_KEY:}
kma.stn=108
kma.warning.now.url=https://apihub.kma.go.kr/api/typ01/url/wrn_now_data.php
kma.warning.fe=f
kma.warning.authKey=${KMA_WARNING_AUTH_KEY:${KMA_AUTH_KEY:}}
kma.http.connect-timeout=3s
kma.http.read-timeout=10s
server.port=8080

# Common defaults. Prefer environment variables in production.
# Local development can override these in application-local.properties at the project root.
# MariaDB via Docker (host 3307 -> container 3306)
spring.datasource.url=jdbc:mariadb://localhost:3307/weather?createDatabaseIfNotExist=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
spring.datasource.username=${MYSQL_USER:root}
# Password: env MYSQL_PASSWORD, or override in application-local.properties (project root, gitignored)
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Session cookie security. Set SESSION_COOKIE_SECURE=true in HTTPS environments.
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.timeout=${SESSION_TIMEOUT:30m}
server.forward-headers-strategy=framework

# Last: local overrides (see application-local.properties.example)
spring.config.import=optional:file:./application-local.properties
